<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMO - Multsoft</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f0;--surf:#fff;--surf2:#f7f9f7;--border:#e2e8e2;--border2:#cdd6cd;
  --nav:#1c3a28;--green:#2d6e4e;--green2:#3a8f65;--green-s:rgba(45,110,78,.10);
  --red:#c0392b;--red-s:rgba(192,57,43,.09);--orange:#b85c00;--orange-s:rgba(184,92,0,.09);
  --blue:#1a5276;--blue-s:rgba(26,82,118,.09);--purple:#5b3fa0;--purple-s:rgba(91,63,160,.09);
  --text:#1a2e1a;--text2:#4a5e4a;--muted:#7a917a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overscroll-behavior-y:auto;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
/* NAV */
nav{background:var(--nav);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:32px;height:32px;background:var(--green2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;}
.nav-title{font-weight:700;font-size:14px;color:#fff;}
.nav-title em{color:#7dcba0;font-style:normal;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);}
.btn-reload{background:var(--green2);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;}
.btn-history{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.72);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:7px 12px;border-radius:7px;cursor:pointer;}
.btn-history:hover{background:rgba(255,255,255,.14);color:#fff;}
/* PERIOD BAR */
.period-bar{background:var(--nav);padding:6px 24px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(255,255,255,.08);}
.period-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-right:2px;}
.pb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;padding:3px 12px;border-radius:4px;cursor:pointer;}
.pb:hover,.pb.on{background:var(--green2);border-color:var(--green2);color:#fff;}
/* TABS */
.tabs{background:var(--surf);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;}
.tab{background:none;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;color:var(--muted);padding:13px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--green);border-bottom-color:var(--green);}
.tab .n{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;background:var(--border);color:var(--muted);font-size:10px;border-radius:8px;padding:0 4px;margin-left:5px;}
.tab.on .n{background:var(--green-s);color:var(--green);}
/* PAGES */
.page{display:none;padding:20px 24px 80px;max-width:1400px;margin:0 auto;}
.page.on{display:block;}
/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.kpi{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border2);}
.kpi.g::before{background:var(--green);}.kpi.r::before{background:var(--red);}.kpi.o::before{background:var(--orange);}.kpi.b::before{background:var(--blue);}
.kpi-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.kpi-v{font-size:26px;font-weight:800;color:var(--text);}
.kpi.g .kpi-v{color:var(--green);}.kpi.r .kpi-v{color:var(--red);}.kpi.o .kpi-v{color:var(--orange);}.kpi.b .kpi-v{color:var(--blue);}
/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sh-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.sh-count{font-size:12px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;}
/* FILTER BOX */
.fbox{background:var(--surf);border:1px solid var(--border);border-radius:10px;margin-bottom:18px;overflow:hidden;}
.frow{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.frow:last-child{border-bottom:none;}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 14px;min-width:85px;border-right:1px solid var(--border);background:var(--surf2);flex-shrink:0;}
.fbts{display:flex;gap:5px;padding:8px 12px;flex-wrap:wrap;}
.fb{background:none;border:1px solid var(--border);color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;cursor:pointer;}
.fb:hover{background:var(--surf2);}
.fb.on{background:var(--nav);border-color:var(--nav);color:#fff;}
.fb.on.r{background:var(--red);border-color:var(--red);}
.fb.on.b{background:var(--blue);border-color:var(--blue);}
.project-search-wrap{display:flex;align-items:center;gap:8px;width:100%;}
.project-search{width:min(520px,100%);height:34px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:0 14px;outline:none;transition:border-color .18s ease,box-shadow .18s ease;}
.project-search::placeholder{color:var(--muted);font-weight:500;}
.project-search:focus{border-color:rgba(45,110,78,.45);box-shadow:0 0 0 4px rgba(45,110,78,.08);}
.project-search-clear{height:30px;border:1px solid var(--border);border-radius:999px;background:var(--surf);color:var(--muted);font-size:11px;font-weight:800;padding:0 12px;cursor:pointer;}
.project-search-clear:hover{background:var(--surf2);color:var(--text);}
.month-group{border-top:1px solid #edf2eb;}
.month-group:first-child{border-top:none;}
.month-group-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:#f8fbf6;border-bottom:1px solid #e4ece1;}
.month-group-title{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#627161;}
.month-group-meta{font-size:11px;font-weight:700;color:#7b8a7a;font-family:'JetBrains Mono',monospace;}
.month-group-body{background:#fff;}
.month-group .empty{padding:26px 20px;}
/* TABLE */
.ptable{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ptable-head{display:grid;grid-template-columns:1fr 130px 80px 80px 110px 24px;padding:8px 14px;background:var(--surf2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.prow{display:grid;grid-template-columns:1fr 130px 80px 80px 110px 24px;padding:0 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.prow:last-child{border-bottom:none;}
.prow:hover{background:var(--surf2);}
.prow.is-r{border-left:3px solid var(--red);padding-left:11px;}.prow.is-o{border-left:3px solid var(--orange);padding-left:11px;}.prow.is-b{border-left:3px solid var(--blue);padding-left:11px;}
.pcell{display:flex;align-items:center;padding:10px 6px 10px 0;}
.pcell:first-child{flex-direction:column;align-items:flex-start;gap:2px;}
.pname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.pname-row{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;}
.project-link-btn{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:5px;border:1px solid var(--green);background:var(--green-s);color:var(--green);font-size:10px;font-weight:700;text-decoration:none;flex-shrink:0;}
.project-link-btn:hover{background:var(--green);color:#fff;}
.project-link-btn.alt{border-color:var(--blue);background:rgba(52,152,219,.08);color:var(--blue);}
.project-link-btn.alt:hover{background:var(--blue);color:#fff;}
.project-link-btn.warn{border-color:var(--orange);background:rgba(230,126,34,.08);color:var(--orange);}
.project-link-btn.warn:hover{background:var(--orange);color:#fff;}
.project-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.psub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.chev{color:var(--muted);font-size:14px;justify-content:flex-end;transition:transform .2s;}
.prow.open .chev{transform:rotate(90deg);}
/* EXPAND */
.pexpand{display:none;border-bottom:1px solid var(--border);background:var(--surf2);}
.prow.open + .pexpand{display:block;}
.px-inner{padding:14px 18px 18px;}
/* PRAZO CARDS */
.prazo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.prazo-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.prazo-card.warn{border-color:rgba(192,57,43,.35);background:rgba(192,57,43,.02);}
.prazo-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.prazo-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:2px;}
.prazo-meta{font-size:10px;color:var(--muted);}
.prazo-bar{background:var(--border);height:4px;border-radius:2px;overflow:hidden;margin-top:8px;}
.prazo-bar-fill{height:100%;border-radius:2px;}
.prazo-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;float:right;margin-top:-2px;}
/* DBAR */
.dbar{margin-bottom:12px;}
.dbar-info{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--text2);}
.dbar-bg{background:var(--border);height:6px;border-radius:3px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:3px;}
/* EXP GRID */
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px;}
.ef-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;}
.ef-v{font-size:13px;font-weight:600;}
.log-box{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2);line-height:1.6;margin-top:4px;}
.obs-box{background:var(--blue-s);border:1px solid rgba(26,82,118,.15);border-radius:6px;padding:8px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--blue);line-height:1.6;}
.sec-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;margin-top:10px;}
.exec-wrap{background:linear-gradient(180deg,#f9fcfa 0%,#f4f8f5 100%);border:1px solid var(--border);border-radius:10px;padding:12px 12px 10px;margin:10px 0 6px;}
.exec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.exec-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--green);}
.exec-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--green-s);color:var(--green);}
.exec-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:8px;margin-bottom:10px;}
.exec-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.exec-card .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.exec-card .val{font-size:21px;font-weight:800;line-height:1.1;color:var(--text);}
.exec-card .sub{font-size:10px;color:var(--muted);}
.exec-progress{margin:8px 0 2px;}
.exec-progress .meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.exec-progress .bg{height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
.exec-progress .fill{height:100%;background:linear-gradient(90deg,var(--green) 0%,var(--green2) 100%);}
.exec-split{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.exec-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.exec-pill.t{background:var(--blue-s);color:var(--blue);}
.exec-pill.m{background:var(--purple-s);color:var(--purple);}
/* TAGS */
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.tag-g{background:var(--green-s);color:var(--green);}.tag-r{background:var(--red-s);color:var(--red);}.tag-o{background:var(--orange-s);color:var(--orange);}.tag-b{background:var(--blue-s);color:var(--blue);}.tag-p{background:var(--purple-s);color:var(--purple);}.tag-gray{background:var(--surf2);color:var(--muted);}
/* CONSULTANT CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.cc{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.cc:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);}
.cc.on{border-color:var(--green);box-shadow:0 0 0 2px var(--green-s);}
.cc-top{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.cc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;background:rgba(255,255,255,.2);}
.cc-name{font-size:14px;font-weight:700;color:#fff;}
.cc-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}
.cc-body{padding:12px 14px;}
.cc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.cc-s{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:7px 5px;text-align:center;cursor:pointer;}
.cc-s:hover{background:var(--border);}
.cc-sl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
.cc-sv{font-size:17px;font-weight:800;color:var(--text);}
.cc-sv.o{color:var(--orange);}.cc-sv.r{color:var(--red);}.cc-sv.b{color:var(--blue);}
.cc-dl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;}
.cc-db{background:var(--border);height:4px;border-radius:2px;overflow:hidden;}
.cc-df{height:100%;border-radius:2px;}
/* DETAIL PANEL */
.cdetail{background:var(--surf);border:1px solid var(--border);border-radius:10px;margin-top:16px;overflow:hidden;}
.cd-top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.cd-name{font-size:17px;font-weight:800;color:#fff;}
.cd-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.cd-close{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:5px;cursor:pointer;}
.cd-body{padding:18px;}
.cd-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.page-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:-2px 0 14px;}
.page-toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.search-input{min-width:280px;max-width:420px;width:min(420px,100%);height:38px;border:1px solid var(--border);border-radius:999px;background:var(--surf);padding:0 14px;font:600 13px 'Inter',sans-serif;color:var(--text);box-shadow:0 1px 2px rgba(20,32,24,.03);}
.search-input:focus{outline:none;border-color:rgba(45,110,78,.35);box-shadow:0 0 0 4px rgba(45,110,78,.08);}
.search-note{font-size:11px;font-weight:700;color:var(--muted);}
.month-group{border-top:1px solid var(--border);}
.month-group:first-child{border-top:none;}
.month-group-title{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:linear-gradient(180deg,#f8faf7,#f5f8f5);border-bottom:1px solid var(--border);}
.month-group-name{font-size:11px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--green);}
.month-group-count{font-size:11px;font-weight:800;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.kpi.kpi-btn{cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;}
.kpi.kpi-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(20,32,24,.06);}
.kpi.kpi-btn.active{border-color:rgba(45,110,78,.32);box-shadow:0 0 0 3px rgba(45,110,78,.08);}
/* AVULSO */
.av-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
.av-col{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.av-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surf2);}
.av-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;}
.av-row:last-child{border-bottom:none;}
.av-name{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px;}
.dash-kpi{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;cursor:default;}
.dash-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border2);}
.dash-kpi.c-g::before{background:var(--green);}.dash-kpi.c-r::before{background:var(--red);}.dash-kpi.c-o::before{background:var(--orange);}.dash-kpi.c-b::before{background:var(--blue);}
.dash-kpi-icon{font-size:20px;margin-bottom:6px;}
.dash-kpi-v{font-size:34px;font-weight:800;line-height:1;margin-bottom:3px;}
.dash-kpi.c-g .dash-kpi-v{color:var(--green);}.dash-kpi.c-r .dash-kpi-v{color:var(--red);}.dash-kpi.c-o .dash-kpi-v{color:var(--orange);}.dash-kpi.c-b .dash-kpi-v{color:var(--blue);}
.dash-kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.dash-trend{font-size:11px;font-weight:600;margin-top:5px;}
.dash-trend.bad{color:var(--red);}.dash-trend.good{color:var(--green);}.dash-trend.neu{color:var(--muted);}
.dash-row{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px;}
.dash-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.dash-panel{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.dash-ph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surf2);}
.dash-ph-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.dash-pb{padding:14px 16px;}.dash-pb::-webkit-scrollbar{width:4px;}.dash-pb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
/* CRITICO ROWS */
.crit-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.crit-row:last-child{border-bottom:none;}
.crit-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
/* RANK BARS */
.rank-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.rank-row:last-child{margin-bottom:0;}
.rank-name{font-size:12px;font-weight:700;min-width:75px;}
.rank-bg{flex:1;background:var(--border);height:7px;border-radius:3px;overflow:hidden;}
.rank-fill{height:100%;border-radius:3px;}
.rank-n{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:24px;text-align:right;}
/* TREND */
.trend-wrap{display:flex;align-items:flex-end;gap:6px;min-height:110px;}
.trend-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer;}
.trend-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
.trend-month{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.trend-n{font-size:10px;font-weight:700;}
/* STATUS BARS */
.stat-row{margin-bottom:10px;}
.stat-row:last-child{margin-bottom:0;}
.stat-info{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px;}
.stat-bar-bg{background:var(--border);height:7px;border-radius:3px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:3px;}
/* PRAZOS PAGE */
.pf-btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;margin-right:5px;margin-bottom:5px;}
.pf-btn.on{background:var(--nav);border-color:var(--nav);color:#fff;}
.pz-card{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.pz-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.pz-viols{display:flex;gap:8px;padding:12px 14px;flex-wrap:wrap;}
.pz-vcard{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;min-width:150px;flex:1;}
.pz-vcard.warn{border-color:rgba(192,57,43,.3);}
.pz-vtitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
.pz-vnum{font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;}
.pz-vbar{background:var(--border);height:3px;border-radius:2px;overflow:hidden;margin-bottom:3px;}
.pz-vbar-fill{height:100%;border-radius:2px;}
.pz-vextra{font-size:10px;font-weight:700;}
/* CONSULTANT SUMMARY BAR */
.consult-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--surf);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;}
.consult-bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-right:2px;flex-shrink:0;}
.cbtn{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;}
/* MISC */
.empty{padding:40px;text-align:center;color:var(--muted);}
.toast{position:fixed;bottom:18px;right:18px;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;font-family:'JetBrains Mono',monospace;display:none;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:999;}
.toast.show{display:flex;}
.toast.ok{border-color:rgba(45,110,78,.4);color:var(--green);}
.toast.err{border-color:rgba(192,57,43,.4);color:var(--red);}
.history-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:10001;display:flex;align-items:center;justify-content:center;padding:20px;}
.history-box{width:min(620px,calc(100vw - 36px));max-height:min(76vh,680px);background:var(--surf);border:1px solid var(--border);border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden;}
.history-head{padding:18px 20px 10px;border-bottom:1px solid var(--border);}
.history-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px;}
.history-sub{font-size:12px;color:var(--text2);line-height:1.5;}
.history-body{padding:14px 20px;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;color:var(--text2);white-space:pre-wrap;}
.history-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;background:var(--surf2);}
.history-close{background:var(--green);border:1px solid var(--green);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;padding:8px 22px;border-radius:8px;cursor:pointer;}
.history-close:hover{background:var(--green2);border-color:var(--green2);}
.load-overlay{position:fixed;inset:0;background:rgba(12,24,18,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:20000;}
.load-box{background:#0f2418;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px 24px;min-width:320px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.36);}
.load-spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.12);border-top-color:#7dcba0;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 14px;}
.load-title{font-size:13px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:.4px;}
.load-text{font-size:12px;color:rgba(255,255,255,.62);text-align:center;font-family:'JetBrains Mono',monospace;}
.refresh-bar{position:fixed;top:58px;left:0;right:0;height:3px;background:linear-gradient(90deg,#7dcba0 0%,#2d6e4e 100%);transform-origin:left;transform:scaleX(0);transition:transform .35s ease;z-index:201;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1100px){.dash-grid{grid-template-columns:repeat(3,1fr)}.dash-row,.dash-row2{grid-template-columns:1fr}.av-split{grid-template-columns:1fr}.prazo-grid{grid-template-columns:1fr}.exec-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:720px){nav{padding:0 14px}.nav-date{font-size:10px}.btn-reload{padding:6px 10px;font-size:11px}.page{padding:14px}.period-bar{padding:6px 14px;overflow-x:auto}.kpis,.dash-grid,.exec-grid,.exp-grid,.cgrid{grid-template-columns:1fr}.ptable-head,.prow{grid-template-columns:minmax(0,1fr) 92px 70px 70px 82px 18px;font-size:9px}.pcell{padding:10px 4px 10px 0}.pname{font-size:12px}.psub{font-size:9px}.dash-kpi-v{font-size:28px}.fbts{padding:8px}.fb{font-size:10px;padding:3px 8px}.consult-bar{padding:8px}.cbtn{font-size:10px}.cd-body{padding:12px}.leaflet-popup-content{width:240px!important;}.main-content{overflow-x:hidden;}.cc-top{flex-wrap:wrap;}.cc-sub{width:100%;}.cc-stats{grid-template-columns:repeat(2,1fr);} .page-toolbar{flex-direction:column;align-items:stretch;} .page-toolbar-left{width:100%;} .page-toolbar-right{width:100%;justify-content:flex-start;} .search-input{min-width:0;width:100%;max-width:none;} }
.page-toolbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
.search-meta{font-size:12px;font-weight:700;color:var(--text2);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.month-group-namewrap{display:flex;flex-direction:column;gap:4px;min-width:0;}
.month-group-order{font-size:11px;font-weight:700;color:var(--text2);line-height:1.4;}
.month-seq-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:rgba(45,110,78,.08);border:1px solid rgba(45,110,78,.14);color:var(--green);font-size:10px;font-weight:700;letter-spacing:.1px;}
.pcell-main{display:flex;flex-direction:column;gap:6px;min-width:0;width:100%;}
.pcell-subline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;width:100%;}
.pcell-submeta{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.metric-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.metric-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid rgba(45,110,78,.14);background:rgba(45,110,78,.08);color:var(--green);}
.metric-chip.warn{border-color:rgba(184,92,0,.18);background:rgba(184,92,0,.09);color:var(--orange);}
.metric-chip.risk{border-color:rgba(192,57,43,.18);background:rgba(192,57,43,.08);color:var(--red);}
.period-bar{background:#f6faf6;border-bottom:1px solid #dbe5d9;padding:10px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:58px;z-index:195;backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(37,79,50,.04);}
.period-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:#7b8a7a;margin-right:2px;}
.pb{background:#fbfcfa;border:1px solid #cedacd;color:#5d6e5d;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:7px 16px;border-radius:999px;cursor:pointer;box-shadow:0 1px 1px rgba(18,27,22,.02);transition:all .18s ease;}
.pb:hover{border-color:#aec6b2;color:#244533;background:#fdfefd;}
.pb.on{background:#6f886f;border-color:#6f886f;color:#fff;box-shadow:0 10px 26px rgba(111,136,111,.22);}
